<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Triad Quiz">
<title>Triad Quiz</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:#0e0e0f; --surface:#1a1a1c; --surface2:#242428;
  --border:#2e2e34; --accent:#d4a847; --accent2:#7b9e6b;
  --red:#c0544a; --text:#e8e4dc; --muted:#6b6860;
  --fret-bg:#1c1810; --fret-border:#3a3020; --fret-row:#2a2218;
  --fret-bar:#323030; --nut:#c8b87a;
}
body.light {
  --bg:#f0ece3; --surface:#e6e1d6; --surface2:#ddd8cc;
  --border:#c8c0b0; --text:#1e1c18; --muted:#8a8070;
  --accent:#b8920a; --accent2:#3d8a4a; --red:#a03530;
  --fret-bg:#c8bb98; --fret-border:#b0a480; --fret-row:#c0b490; --fret-bar:#9a9080; --nut:#8a7040;
}

html, body { width:100%; height:100%; }
body {
  background:var(--bg);
  color:var(--text);
  font-family: ui-monospace, 'SF Mono', Menlo, Courier, monospace;
  display:flex;
  flex-direction:column;
  height:100vh;
  height:-webkit-fill-available;
  overflow:hidden;
}

/* HEADER */
#hdr {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#hdr-title { font-family:Georgia,serif; font-size:20px; font-weight:900; color:var(--text); }
#hdr-title span { color:var(--accent); }
#hdr-right { display:flex; align-items:center; gap:10px; }
#score-display { font-size:11px; color:var(--muted); text-align:right; }
#score-display strong { display:block; font-size:15px; color:var(--accent); }
#settings-btn {
  width:34px; height:34px; border-radius:8px;
  border:1px solid var(--border); background:none;
  color:var(--muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* MODE TABS */
#mode-tabs {
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
.mode-tab {
  flex:1; padding:10px 4px;
  border:none; background:transparent;
  color:var(--muted); font-family:inherit;
  font-size:11px; letter-spacing:.06em; text-transform:uppercase;
  border-bottom:2px solid transparent;
  cursor:pointer; transition:all .2s;
}
.mode-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* PLACE PROMPT */
#place-prompt {
  display:none;
  text-align:center;
  padding:12px 16px 8px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#place-chord-name { font-family:Georgia,serif; font-size:28px; font-weight:900; color:var(--accent); }
#place-chord-inv { font-size:11px; color:var(--muted); letter-spacing:.08em; margin-top:2px; }
#place-dot-count { font-size:11px; color:var(--muted); margin-top:5px; }
#place-all-row {
  display:flex; align-items:center; justify-content:center;
  gap:8px; margin-top:8px;
  font-size:10px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase;
}

/* FRETBOARD */
#fb-wrap {
  flex:1;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  padding:10px 8px 4px;
  background:var(--bg);
  min-height:0;
}
#fb-container { min-width:640px; position:relative; }
#fb-markers {
  display:flex; padding-left:34px; height:12px;
  align-items:center; margin-bottom:3px;
}
.fb-marker-cell {
  flex:1; display:flex; align-items:center;
  justify-content:center; gap:3px;
}
.fb-marker-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--muted); opacity:.4;
}
#fretboard {
  background:var(--fret-bg);
  border:1px solid var(--fret-border);
  border-radius:4px; overflow:hidden;
}
.str-row {
  display:flex; align-items:center;
  height:42px; position:relative;
  border-bottom:1px solid var(--fret-row);
}
.str-row:last-child { border-bottom:none; }
.str-lbl {
  width:34px; text-align:center;
  font-size:10px; color:var(--muted);
  flex-shrink:0; position:relative; z-index:2;
}
.str-line {
  position:absolute; left:34px; right:0; top:50%;
  transform:translateY(-50%);
  pointer-events:none; z-index:1;
}
.frets { display:flex; flex:1; height:100%; }
.fret-cell {
  flex:1; height:100%;
  border-right:2px solid var(--fret-bar);
  display:flex; align-items:center; justify-content:center;
  position:relative; z-index:2; cursor:pointer;
}
.fret-cell:last-child { border-right:none; }
#scroll-hint { text-align:center; font-size:9px; color:var(--muted); padding:3px 0; letter-spacing:.05em; }

/* DOTS */
.ndot {
  width:30px; height:30px; border-radius:50%;
  background:var(--accent); color:#1a1200;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:600;
  position:relative; z-index:3;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  pointer-events:none;
  animation:pop .2s cubic-bezier(.34,1.56,.64,1) both;
}
.ndot.placed   { background:var(--accent);  color:#1a1200; }
.ndot.correct  { background:var(--accent2); color:#091209; }
.ndot.wrong    { background:var(--red);     color:#1a0909; }
.ndot.ghost {
  background:transparent;
  border:2px dashed var(--accent2);
  opacity:.6; pointer-events:none;
}
@keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

/* QUIZ PANEL */
#quiz-panel {
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:10px 14px 12px;
  flex-shrink:0;
}
#feedback {
  display:none; text-align:center;
  font-size:12px; font-weight:600;
  padding:7px; border-radius:6px; margin-bottom:8px;
}
#feedback.ok  { display:block; background:rgba(109,184,122,.15); color:var(--accent2); }
#feedback.bad { display:block; background:rgba(192,84,74,.12);   color:var(--red); }
#q-label { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }

#identify-panel { display:block; }
.ans-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.ans-section label { font-size:9px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; display:block; margin-bottom:5px; }
.btn-grp { display:flex; flex-wrap:wrap; gap:4px; }
.ans-btn {
  padding:6px 9px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text);
  border-radius:6px; font-family:inherit; font-size:12px; cursor:pointer;
  transition:all .15s;
}
.ans-btn.sel   { border-color:var(--accent);  color:var(--accent);  background:rgba(212,168,71,.1); }
.ans-btn.ok    { border-color:var(--accent2); color:var(--accent2); background:rgba(109,184,122,.12); }
.ans-btn.bad   { border-color:var(--red);     color:var(--red);     background:rgba(192,84,74,.1); }

.action-row { display:flex; gap:8px; }
#check-btn {
  flex:1; padding:13px;
  background:var(--accent); color:#0e0c06;
  border:none; border-radius:8px;
  font-family:Georgia,serif; font-size:15px; font-weight:700;
  cursor:pointer; transition:all .15s;
}
#check-btn:disabled { opacity:.35; cursor:not-allowed; }
#next-btn {
  padding:13px 18px;
  background:var(--surface2); color:var(--text);
  border:1px solid var(--border); border-radius:8px;
  font-family:inherit; font-size:12px; cursor:pointer;
}

/* SETTINGS */
#s-overlay {
  display:none; position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.55);
  z-index:9998;
}
#s-overlay.open { display:block; }
#s-sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--surface);
  border-radius:16px 16px 0 0;
  border-top:1px solid var(--border);
  z-index:9999;
  padding-bottom:40px;
  max-height:75vh;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform .3s ease;
}
#s-sheet.open { transform:translateY(0); }
.s-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:10px auto; }
.s-title { font-family:Georgia,serif; font-size:16px; font-weight:700; padding:0 20px 12px; border-bottom:1px solid var(--border); }
.s-section { padding:12px 20px 4px; }
.s-sec-lbl { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.s-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 0; border-bottom:1px solid var(--border);
}
.s-row:last-child { border-bottom:none; }
.s-row-label { font-size:13px; }
.s-row-sub { font-size:10px; color:var(--muted); margin-top:2px; }

/* Pills */
.pills { display:flex; gap:8px; flex-wrap:wrap; padding:6px 0 14px; }
.pill {
  padding:7px 16px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--muted); font-family:inherit; font-size:13px;
  cursor:pointer; transition:all .15s; user-select:none;
}
.pill.on { border-color:var(--accent); background:rgba(212,168,71,.12); color:var(--accent); }

/* Toggle */
.tog { position:relative; width:44px; height:26px; flex-shrink:0; }
.tog input { opacity:0; width:0; height:0; }
.tog-slider {
  position:absolute; cursor:pointer;
  top:0;left:0;right:0;bottom:0;
  background:var(--border); border-radius:26px; transition:.3s;
}
.tog-slider:before {
  content:''; position:absolute;
  width:20px; height:20px; left:3px; top:3px;
  background:var(--muted); border-radius:50%; transition:.3s;
}
.tog input:checked + .tog-slider { background:var(--accent); }
.tog input:checked + .tog-slider:before { transform:translateX(18px); background:#0e0c06; }
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-title">Triad<span>.</span>Quiz</div>
  <div id="hdr-right">
    <div id="score-display"><strong id="score-val">0 / 0</strong>correct</div>
    <button id="settings-btn">⚙</button>
  </div>
</div>

<div id="mode-tabs">
  <button class="mode-tab active" id="tab-identify" onclick="setMode('identify')">🎸 Identify</button>
  <button class="mode-tab" id="tab-place" onclick="setMode('place')">🎯 Place It</button>
</div>

<div id="place-prompt">
  <div id="place-chord-name">—</div>
  <div id="place-chord-inv">— inversion</div>
  <div id="place-dot-count">Place <span id="dot-count-val">3</span> dots</div>
  <div id="place-all-row">
    Place all voicings
    <label class="tog"><input type="checkbox" id="place-all-tog"><span class="tog-slider"></span></label>
    <span id="place-all-hint" style="font-size:10px;color:var(--muted)">OFF</span>
  </div>
</div>

<div id="fb-wrap">
  <div id="fb-container">
    <div id="fb-markers"></div>
    <div id="fretboard"></div>
    <div id="scroll-hint">← scroll to see full fretboard →</div>
  </div>
</div>

<div id="quiz-panel">
  <div id="feedback"></div>
  <div id="q-label">What chord and inversion is this?</div>
  <div id="identify-panel">
    <div class="ans-grid">
      <div class="ans-section">
        <label>Chord</label>
        <div id="root-btns" class="btn-grp"></div>
        <div id="type-btns" class="btn-grp" style="margin-top:4px"></div>
      </div>
      <div class="ans-section">
        <label>Inversion</label>
        <div id="inv-btns" class="btn-grp"></div>
      </div>
    </div>
  </div>
  <div class="action-row">
    <button id="check-btn" disabled>Check</button>
    <button id="next-btn">Next →</button>
  </div>
</div>

<!-- Settings -->
<div id="s-overlay"></div>
<div id="s-sheet">
  <div class="s-handle"></div>
  <div class="s-title">Settings</div>
  <div class="s-section">
    <div class="s-sec-lbl">Chord types</div>
    <div class="pills">
      <div class="pill on" data-chord="maj">maj</div>
      <div class="pill on" data-chord="min">min</div>
      <div class="pill" data-chord="dim">dim</div>
      <div class="pill" data-chord="aug">aug</div>
    </div>
  </div>
  <div class="s-section">
    <div class="s-sec-lbl">Display</div>
    <div class="s-row">
      <div><div class="s-row-label">Show intervals</div><div class="s-row-sub">R, ♭3, 5 on dots</div></div>
      <label class="tog"><input type="checkbox" id="show-labels" checked><span class="tog-slider"></span></label>
    </div>
    <div class="s-row">
      <div class="s-row-label">Light mode</div>
      <label class="tog"><input type="checkbox" id="light-mode"><span class="tog-slider"></span></label>
    </div>
  </div>
</div>

<script>
// ── Theory ────────────────────────────────────────────────────────────
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const OPEN  = [4,11,7,2,9,4]; // e B G D A E
const STR_NAMES = ['e','B','G','D','A','E'];
const FRETS = 15;
const INLAY = new Set([3,5,7,9,12,15]);
const DOUBLE = new Set([12]);
const CHORD_TYPES = { maj:[0,4,7], min:[0,3,7], dim:[0,3,6], aug:[0,4,8] };
const INVERSIONS = ['Root','1st','2nd'];
const INV_BASS = {Root:0,'1st':1,'2nd':2};

function noteAt(s,f){ return (OPEN[s]+f)%12; }

function getRoleLabels(t){
  return { maj:['R','3','5'], min:['R','♭3','5'], dim:['R','♭3','♭5'], aug:['R','3','♯5'] }[t];
}

function findTriads(root, quality, inversion){
  const tones = CHORD_TYPES[quality].map(i=>(root+i)%12);
  const bassIdx = INV_BASS[inversion];
  const results = [];
  for(let top=0;top<=3;top++){
    const strs=[top,top+1,top+2];
    const bassStr=strs[2], midStr=strs[1], topStr=strs[0];
    for(let bf=1;bf<=15;bf++){
      if(noteAt(bassStr,bf)!==tones[bassIdx]) continue;
      const rem=[0,1,2].filter(i=>i!==bassIdx);
      for(const [mr,tr] of [[rem[0],rem[1]],[rem[1],rem[0]]]){
        for(let mf=1;mf<=15;mf++){
          if(noteAt(midStr,mf)!==tones[mr]) continue;
          for(let tf=1;tf<=15;tf++){
            if(noteAt(topStr,tf)!==tones[tr]) continue;
            const fs=[tf,mf,bf];
            const span=Math.max(...fs)-Math.min(...fs);
            if(span>4) continue;
            const key=[topStr+'-'+tf,midStr+'-'+mf,bassStr+'-'+bf].sort().join(',');
            if(results.some(r=>r.key===key)) continue;
            results.push({
              key, topStr,
              notes:[{string:topStr,fret:tf,role:tr},{string:midStr,fret:mf,role:mr},{string:bassStr,fret:bf,role:bassIdx}],
              minFret:Math.min(...fs), maxFret:Math.max(...fs),
              center:(Math.min(...fs)+Math.max(...fs))/2, span
            });
          }
        }
      }
    }
  }
  return results;
}

function getOnePerGroup(root,qual,inv){
  const all=findTriads(root,qual,inv);
  const best={};
  for(const s of all){
    const t=Math.min(...s.notes.map(n=>n.string));
    if(t>3) continue;
    if(!best[t]||s.span<best[t].span) best[t]=s;
  }
  return Object.values(best);
}

// ── State ─────────────────────────────────────────────────────────────
let appMode='identify', currentRoot=null, currentType=null, currentInversion=null;
let currentChord=null, checked=false, score=0, total=0;
let selRoot=null, selType=null, selInv=null;
let placedDots=[], placeAllShapes=[];

// ── Build fretboard ───────────────────────────────────────────────────
function buildFretboard(){
  // Markers
  const mr=document.getElementById('fb-markers');
  mr.innerHTML='';
  for(let f=1;f<=FRETS;f++){
    const c=document.createElement('div');
    c.className='fb-marker-cell';
    if(INLAY.has(f)){
      const d=document.createElement('div'); d.className='fb-marker-dot'; c.appendChild(d);
      if(DOUBLE.has(f)){const d2=document.createElement('div');d2.className='fb-marker-dot';c.appendChild(d2);}
    }
    mr.appendChild(c);
  }
  // Strings
  const fb=document.getElementById('fretboard');
  fb.innerHTML='';
  for(let s=0;s<6;s++){
    const row=document.createElement('div'); row.className='str-row';
    const lbl=document.createElement('div'); lbl.className='str-lbl'; lbl.textContent=STR_NAMES[s];
    row.appendChild(lbl);
    // String line
    const line=document.createElement('div'); line.className='str-line';
    const thickness=[1,1.5,1.5,2,2.5,3][s];
    const col=s<3?'#aaa090':s===3?'#8a7850':s===4?'#705040':'#604030';
    line.style.cssText=`height:${thickness}px;background:linear-gradient(90deg,var(--nut),${col})`;
    row.appendChild(line);
    const fwrap=document.createElement('div'); fwrap.className='frets';
    for(let f=1;f<=FRETS;f++){
      const cell=document.createElement('div'); cell.className='fret-cell';
      cell.id=`c-${s}-${f}`;
      cell.addEventListener('click',()=>onCell(s,f));
      fwrap.appendChild(cell);
    }
    row.appendChild(fwrap);
    fb.appendChild(row);
  }
}

function clearDots(){
  document.querySelectorAll('.ndot').forEach(d=>d.remove());
  placedDots=[];
}

function putDot(s,f,cls,label){
  const cell=document.getElementById(`c-${s}-${f}`);
  if(!cell) return null;
  const d=document.createElement('div');
  d.className='ndot '+cls;
  d.textContent=label||'';
  cell.appendChild(d);
  return d;
}

function scrollToFret(f){
  const wrap=document.getElementById('fb-wrap');
  const cw=(wrap.scrollWidth-34)/FRETS;
  wrap.scrollLeft=Math.max(0,(f-3)*cw);
}

// ── Generate question ─────────────────────────────────────────────────
function genQuestion(){
  document.getElementById('feedback').className='';
  document.getElementById('feedback').textContent='';
  checked=false; selRoot=null; selType=null; selInv=null;
  document.querySelectorAll('.ans-btn').forEach(b=>{b.className='ans-btn';b.disabled=false;});
  document.getElementById('check-btn').disabled=true;
  clearDots();

  const enabled=getEnabledTypes();
  if(!enabled.length) return;
  const type=enabled[Math.floor(Math.random()*enabled.length)];
  const rootIdx=Math.floor(Math.random()*12);
  const inv=INVERSIONS[Math.floor(Math.random()*3)];
  const shapes=findTriads(rootIdx,type,inv);
  if(!shapes.length){genQuestion();return;}
  const mid=shapes.filter(s=>s.center>=3&&s.center<=10);
  const pool=mid.length?mid:shapes;
  const shape=pool[Math.floor(Math.random()*pool.length)];

  currentRoot=rootIdx; currentType=type; currentInversion=inv;
  currentChord={notes:shape.notes};
  placeAllShapes=getOnePerGroup(rootIdx,type,inv);

  if(appMode==='place'){
    const label=NOTES[rootIdx]+(type==='maj'?'':type==='min'?'m':type);
    document.getElementById('place-chord-name').textContent=label;
    document.getElementById('place-chord-inv').textContent=inv+' inversion';
    updateDotCount();
    scrollToFret(shape.center);
  } else {
    const showL=document.getElementById('show-labels').checked;
    const labels=getRoleLabels(type);
    shape.notes.forEach(({string,fret,role})=>putDot(string,fret,'',showL?labels[role]:''));
    scrollToFret(shape.center);
  }
}

// ── Answer buttons ────────────────────────────────────────────────────
function buildAnswerBtns(){
  // Roots
  const rb=document.getElementById('root-btns');
  rb.innerHTML='';
  NOTES.forEach(n=>{
    const b=document.createElement('button');
    b.className='ans-btn'; b.dataset.kind='root'; b.dataset.value=n; b.textContent=n;
    b.addEventListener('click',()=>selAnswer(b,'root',n));
    rb.appendChild(b);
  });
  // Types
  const tb=document.getElementById('type-btns');
  tb.innerHTML='';
  Object.keys(CHORD_TYPES).forEach(t=>{
    const b=document.createElement('button');
    b.className='ans-btn'; b.dataset.kind='type'; b.dataset.value=t;
    b.textContent={maj:'maj',min:'m',dim:'dim',aug:'aug'}[t];
    b.addEventListener('click',()=>selAnswer(b,'type',t));
    tb.appendChild(b);
  });
  // Inversions
  const ib=document.getElementById('inv-btns');
  ib.innerHTML='';
  INVERSIONS.forEach(inv=>{
    const b=document.createElement('button');
    b.className='ans-btn'; b.dataset.kind='inv'; b.dataset.value=inv; b.textContent=inv;
    b.addEventListener('click',()=>selAnswer(b,'inv',inv));
    ib.appendChild(b);
  });
  applyTypeVisibility();
}

function selAnswer(btn,kind,val){
  if(checked) return;
  if(kind==='root'){
    document.querySelectorAll('[data-kind="root"]').forEach(b=>b.classList.remove('sel'));
    selRoot=val;
  } else if(kind==='type'){
    document.querySelectorAll('[data-kind="type"]').forEach(b=>b.classList.remove('sel'));
    selType=val;
  } else {
    document.querySelectorAll('[data-kind="inv"]').forEach(b=>b.classList.remove('sel'));
    selInv=val;
  }
  btn.classList.add('sel');
  document.getElementById('check-btn').disabled=!(selRoot&&selType&&selInv);
}

function checkAnswer(){
  if(!selRoot||!selType||!selInv) return;
  checked=true; total++;
  const rOk=selRoot===NOTES[currentRoot];
  const tOk=selType===currentType;
  const iOk=selInv===currentInversion;
  const all=rOk&&tOk&&iOk;
  if(all) score++;
  document.getElementById('score-val').textContent=`${score} / ${total}`;

  document.querySelectorAll('[data-kind="root"]').forEach(b=>{
    if(b.dataset.value===NOTES[currentRoot]) b.classList.add('ok');
    else if(b.dataset.value===selRoot&&!rOk) b.classList.add('bad');
  });
  document.querySelectorAll('[data-kind="type"]').forEach(b=>{
    if(b.dataset.value===currentType) b.classList.add('ok');
    else if(b.dataset.value===selType&&!tOk) b.classList.add('bad');
  });
  document.querySelectorAll('[data-kind="inv"]').forEach(b=>{
    if(b.dataset.value===currentInversion) b.classList.add('ok');
    else if(b.dataset.value===selInv&&!iOk) b.classList.add('bad');
  });

  // Always show labels after check
  clearDots();
  const labels=getRoleLabels(currentType);
  currentChord.notes.forEach(({string,fret,role})=>putDot(string,fret,'',labels[role]));

  const fb=document.getElementById('feedback');
  const name=NOTES[currentRoot]+(currentType==='maj'?'':currentType==='min'?'m':currentType);
  fb.className=all?'ok':'bad';
  fb.textContent=all?`✓ ${name} — ${currentInversion} inversion`:`✗ ${name} — ${currentInversion} inversion`;
  document.getElementById('check-btn').disabled=true;
  document.querySelectorAll('.ans-btn').forEach(b=>b.disabled=true);
}

// ── Place It ──────────────────────────────────────────────────────────
function onCell(s,f){
  if(appMode!=='place'||checked) return;
  const ex=placedDots.findIndex(d=>d.string===s&&d.fret===f);
  if(ex!==-1){
    placedDots[ex].el.remove(); placedDots.splice(ex,1);
    updateDotCount();
    document.getElementById('check-btn').disabled=true;
    return;
  }
  const placeAll=document.getElementById('place-all-tog').checked;
  if(!placeAll&&placedDots.length>=3){
    placedDots[0].el.remove(); placedDots.shift();
  }
  const el=putDot(s,f,'placed','');
  placedDots.push({string:s,fret:f,el});
  updateDotCount();
  const n=placedDots.length;
  document.getElementById('check-btn').disabled=!(n>0&&n%3===0);
}

function updateDotCount(){
  const placeAll=document.getElementById('place-all-tog').checked;
  const n=placedDots.length;
  const el=document.getElementById('dot-count-val');
  if(placeAll){
    el.parentElement.textContent=`${Math.floor(n/3)} / 4 string groups placed`;
  } else {
    const left=3-n;
    el.parentElement.innerHTML=left>0?`Place <span id="dot-count-val">${left}</span> more dots`:'✓ ready to check';
  }
}

function checkPlacement(){
  const placeAll=document.getElementById('place-all-tog').checked;
  if(placeAll) checkPlaceAll(); else checkPlaceSingle();
}

function shapeKey(notes){ return notes.map(n=>`${n.string}-${n.fret}`).sort().join(','); }

function checkPlaceSingle(){
  if(placedDots.length!==3) return;
  checked=true; total++;
  const valid=findTriads(currentRoot,currentType,currentInversion);
  const placed=placedDots.map(d=>`${d.string}-${d.fret}`).sort().join(',');
  const match=valid.find(s=>shapeKey(s.notes)===placed);
  const fb=document.getElementById('feedback');
  const name=NOTES[currentRoot]+(currentType==='maj'?'':currentType==='min'?'m':currentType);
  if(match){
    score++;
    placedDots.forEach(d=>{d.el.remove();putDot(d.string,d.fret,'correct','');});
    fb.className='ok'; fb.textContent=`✓ ${name} — ${currentInversion} inversion`;
  } else {
    placedDots.forEach(d=>{d.el.remove();putDot(d.string,d.fret,'wrong','');});
    if(valid.length){
      valid[0].notes.forEach(({string,fret})=>{
        if(!placedDots.some(d=>d.string===string&&d.fret===fret)) putDot(string,fret,'ghost','');
      });
    }
    fb.className='bad'; fb.textContent=`✗ ${name} — ${currentInversion} inversion`;
  }
  document.getElementById('score-val').textContent=`${score} / ${total}`;
  document.getElementById('check-btn').disabled=true;
}

function checkPlaceAll(){
  if(!placedDots.length||placedDots.length%3!==0) return;
  checked=true; total++;
  const groups=[];
  for(let i=0;i<placedDots.length;i+=3) groups.push(placedDots.slice(i,i+3));
  const matchedShapes=new Set(), matchedGroups=new Set();
  for(let gi=0;gi<groups.length;gi++){
    const gk=groups[gi].map(d=>`${d.string}-${d.fret}`).sort().join(',');
    for(const shape of placeAllShapes){
      const sk=shapeKey(shape.notes);
      if(sk===gk&&!matchedShapes.has(sk)){matchedShapes.add(sk);matchedGroups.add(gi);break;}
    }
  }
  for(let gi=0;gi<groups.length;gi++){
    const cls=matchedGroups.has(gi)?'correct':'wrong';
    groups[gi].forEach(d=>{d.el.remove();putDot(d.string,d.fret,cls,'');});
  }
  for(const shape of placeAllShapes){
    if(!matchedShapes.has(shapeKey(shape.notes))){
      shape.notes.forEach(({string,fret})=>{
        if(!placedDots.some(d=>d.string===string&&d.fret===fret)) putDot(string,fret,'ghost','');
      });
    }
  }
  const all=matchedShapes.size===placeAllShapes.length&&groups.length===placeAllShapes.length;
  if(all) score++;
  document.getElementById('score-val').textContent=`${score} / ${total}`;
  const name=NOTES[currentRoot]+(currentType==='maj'?'':currentType==='min'?'m':currentType);
  const fb=document.getElementById('feedback');
  fb.className=all?'ok':'bad';
  fb.textContent=all?`✓ All 4 groups! ${name} — ${currentInversion}`:`✗ Found ${matchedShapes.size}/${placeAllShapes.length} — ${name} ${currentInversion}`;
  document.getElementById('check-btn').disabled=true;
}

// ── Mode ──────────────────────────────────────────────────────────────
function setMode(m){
  appMode=m;
  document.getElementById('tab-identify').classList.toggle('active',m==='identify');
  document.getElementById('tab-place').classList.toggle('active',m==='place');
  document.getElementById('place-prompt').style.display=m==='place'?'block':'none';
  document.getElementById('identify-panel').style.display=m==='identify'?'block':'none';
  document.getElementById('q-label').style.display=m==='identify'?'block':'none';
  clearDots(); placedDots=[];
  checked=false;
  document.getElementById('feedback').className='';
  document.getElementById('check-btn').disabled=true;
  genQuestion();
}

// ── Settings ──────────────────────────────────────────────────────────
function getEnabledTypes(){
  return [...document.querySelectorAll('.pill.on')].map(p=>p.dataset.chord);
}
function applyTypeVisibility(){
  const on=getEnabledTypes();
  document.querySelectorAll('[data-kind="type"]').forEach(b=>{
    b.style.display=on.includes(b.dataset.value)?'':'none';
  });
}

document.getElementById('settings-btn').addEventListener('click',()=>{
  document.getElementById('s-sheet').classList.add('open');
  document.getElementById('s-overlay').classList.add('open');
});
document.getElementById('s-overlay').addEventListener('click',()=>{
  document.getElementById('s-sheet').classList.remove('open');
  document.getElementById('s-overlay').classList.remove('open');
});
document.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',()=>{
    const on=getEnabledTypes();
    if(p.classList.contains('on')&&on.length===1) return;
    p.classList.toggle('on');
    applyTypeVisibility();
    if(currentType&&!getEnabledTypes().includes(currentType)){
      clearDots(); placedDots=[]; genQuestion();
    }
  });
});
document.getElementById('show-labels').addEventListener('change',function(){
  if(currentChord&&!checked&&appMode==='identify'){
    clearDots();
    const labels=getRoleLabels(currentType);
    currentChord.notes.forEach(({string,fret,role})=>putDot(string,fret,'',this.checked?labels[role]:''));
  }
});
document.getElementById('light-mode').addEventListener('change',function(){
  document.body.classList.toggle('light',this.checked);
});
document.getElementById('place-all-tog').addEventListener('change',function(){
  document.getElementById('place-all-hint').textContent=this.checked?'ON':'OFF';
  clearDots(); placedDots=[]; checked=false;
  document.getElementById('feedback').className='';
  document.getElementById('check-btn').disabled=true;
  updateDotCount();
});

// ── Init ──────────────────────────────────────────────────────────────
buildFretboard();
buildAnswerBtns();

document.getElementById('check-btn').addEventListener('click',()=>{
  if(appMode==='place') checkPlacement(); else checkAnswer();
});
document.getElementById('next-btn').addEventListener('click',()=>{
  clearDots(); placedDots=[];
  selRoot=null; selType=null; selInv=null;
  genQuestion();
});

genQuestion();
</script>
